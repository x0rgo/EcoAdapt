services:
  - type: web
    name: ecoadapt
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: mistralai/mistral-nemo
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DB_PATH
        value: /data/ecoadapt.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1